<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>记录人类接力棒传递全过程 | 日记</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="./index.html">
        <span class="brand-mark">Σ</span>
        <span>接力日记</span>
      </a>
      <nav class="nav-links">
        <a href="./index.html#diary">日记</a>
        <a href="./flow.html">心流</a>
        <a href="https://github.com/susyimes" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="diary-header">
      <div class="container">
        <span class="eyebrow">Agent / AI Skill 应用档案</span>
        <h1>记录人类接力棒传递全过程</h1>
        <p class="lead">

        </p>
      </div>
    </section>

    <section id="diary" class="section" style="border-bottom: none">
      <div class="container">
        <div class="diary-controls">
          <div class="filter-group">
            <span class="filter-label">按技术栈/场景筛选</span>
            <select id="tagFilter" aria-label="按标签筛选日记">
              <option value="all">显示全部记录</option>
            </select>
          </div>
          <div id="statsCounter" class="archive-counter mono">
            0 条记录
          </div>
        </div>

        <div id="entryList" class="entry-list" aria-live="polite">
          <div class="card archive-loading">
            <p>正在载入记录...</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <h3>Agent 应用工程记录</h3>
        <p class="footer-text">只保留公开方法论、工程线索和可复盘判断。</p>
      </div>
      <p class="footer-text">AI Agent 应用工程 / Android 架构</p>
    </div>

  <script src="./scripts/particles.js"></script>
  <script src="./scripts/diary.js"></script>
